  <rect width="1200" height="600" fill="#0F172A"/>
  <rect x="40" y="40" width="1120" height="520" rx="14" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
  <rect x="40" y="40" width="1120" height="56" rx="14" fill="#0F172A"/>
